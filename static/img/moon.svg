<svg id="moon-phase" viewBox="0 0 100 100" width="120" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="moon-glow">
    <feGaussianBlur stdDeviation="1.2"/>
  </filter>

  <clipPath id="moon-disc-clip">
    <circle cx="50" cy="50" r="44"/>
  </clipPath>

  <!-- White reveals shadow overlay, black hides it -->
  <mask id="shadow-mask">
    <rect width="100" height="100" fill="black"/>
    <ellipse id="terminator" cx="50" cy="50" rx="44" ry="44" fill="white"/>
  </mask>
</defs>

<!-- Base moon texture always fully visible -->
<image
  href="/static/img/textures/moon.jpg"
  x="0"
  y="0"
  width="100"
  height="100"
  preserveAspectRatio="xMidYMid slice"
  clip-path="url(#moon-disc-clip)"
  filter="url(#moon-glow)"
/>

<!-- Shadow darkens texture instead of replacing it with black -->
<circle
  cx="50"
  cy="50"
  r="44"
  fill="#000000"
  fill-opacity="0.65"
  clip-path="url(#moon-disc-clip)"
  mask="url(#shadow-mask)"
/>
</svg>