name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_slug: linux-amd64
          - platform: linux/arm64
            platform_slug: linux-arm64
    outputs:
      UNIQUE_TAGS: ${{ steps.dedup_tags.outputs.unique_tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Normalize image name (lowercase)
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Read VERSION
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate version format
        run: |
          if ! [[ "${{ steps.version.outputs.VERSION }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${{ steps.version.outputs.VERSION }}"
            exit 1
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.VERSION }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.VERSION }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest

      - name: Deduplicate tags
        id: dedup_tags
        run: |
          UNIQUE_TAGS=$(echo "${{ steps.meta.outputs.tags }}" | tr ' ' '\n' | sort -u | tr '\n' ' ')
          echo "unique_tags=$UNIQUE_TAGS" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true
          pull: true
          provenance: true
          sbom: true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.platform_slug }}
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache-${{ matrix.platform_slug }}
          cache-to: |
            type=gha,scope=${{ matrix.platform_slug }},mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache-${{ matrix.platform_slug }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          [ -n "$digest" ] && touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.platform_slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-and-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
      packages: write
    env:
      TAGS: ${{ needs.build-and-push.outputs.UNIQUE_TAGS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Normalize image name (lowercase)
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Read VERSION
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate version format
        run: |
          if ! [[ "${{ steps.version.outputs.VERSION }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${{ steps.version.outputs.VERSION }}"
            exit 1
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create multi-arch manifest and push
        working-directory: /tmp/digests
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          TAGS: ${{ env.TAGS }}
        run: |
          set -euo pipefail

          echo "Parsing tags..."
          TAG_ARGS=()
          for tag in $TAGS; do
            [ -n "$tag" ] && TAG_ARGS+=("-t" "$tag")
          done
          echo "TAG_ARGS: ${TAG_ARGS[*]}"

          echo "Parsing digests..."
          DIGEST_ARGS=()
          for f in *; do
            [ -n "$f" ] && DIGEST_ARGS+=("$REGISTRY/$IMAGE_NAME@sha256:$f")
          done
          echo "DIGEST_ARGS: ${DIGEST_ARGS[*]}"

          docker buildx imagetools create "${TAG_ARGS[@]}" "${DIGEST_ARGS[@]}"

      - name: Scan image for vulnerabilities
        #uses: aquasecurity/trivy-action@0.34.1 # Curent issue in this version, wait for fix
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.VERSION }}
          format: table
          exit-code: 0

      - name: Generate Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        id: release_notes
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREVIOUS_TAG=$(git tag --sort=-version:refname | sed -n 2p)

          echo "## 🚀 What's Changed" > release_notes.md
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "### 📋 Commits since $PREVIOUS_TAG:" >> release_notes.md
            git log "$PREVIOUS_TAG..$CURRENT_TAG" \
              --reverse --date-order \
              --pretty=format:"- %s (%an) - %h" \
              --invert-grep --grep="Merge" >> release_notes.md
          else
            echo "### 📋 Initial Release Commits:" >> release_notes.md
            git log --reverse --date-order \
              --pretty=format:"- %s (%an) - %h" \
              --invert-grep --grep="Merge" >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "## 🐳 Docker Image" >> release_notes.md
          echo "Pull the image with:" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "docker pull \"ghcr.io/${{ steps.image.outputs.name }}:${{ steps.version.outputs.VERSION }}\"" >> release_notes.md
          echo '```' >> release_notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}