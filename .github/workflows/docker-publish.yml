name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_slug: linux-amd64
          - platform: linux/arm64
            platform_slug: linux-arm64
    outputs:
      UNIQUE_TAGS: ${{ steps.dedup_tags.outputs.unique_tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Normalize image name (lowercase)
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Read VERSION
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate version format
        run: |
          if ! [[ "${{ steps.version.outputs.VERSION }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${{ steps.version.outputs.VERSION }}"
            exit 1
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.VERSION }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.VERSION }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest

      - name: Deduplicate tags
        id: dedup_tags
        run: |
          UNIQUE_TAGS=$(echo "${{ steps.meta.outputs.tags }}" | tr ' ' '\n' | sort -u | tr '\n' ' ')
          echo "unique_tags=$UNIQUE_TAGS" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ matrix.platform_slug }}-build
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.platform_slug }}
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache-${{ matrix.platform_slug }}
          cache-to: |
            type=gha,scope=${{ matrix.platform_slug }},mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:buildcache-${{ matrix.platform_slug }},mode=max

  merge-and-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
      packages: write
    env:
      TAGS: ${{ needs.build-and-push.outputs.UNIQUE_TAGS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Normalize image name (lowercase)
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Read VERSION
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate version format
        run: |
          if ! [[ "${{ steps.version.outputs.VERSION }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${{ steps.version.outputs.VERSION }}"
            exit 1
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest and push
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          
          echo "Creating and pushing multi-arch manifest..."
          
          docker buildx imagetools create \
            -t "$REGISTRY/$IMAGE_NAME:latest" \
            -t "$REGISTRY/$IMAGE_NAME:$VERSION" \
            -t "$REGISTRY/$IMAGE_NAME:${VERSION%.*}" \
            -t "$REGISTRY/$IMAGE_NAME:${VERSION%%.*}" \
            "$REGISTRY/$IMAGE_NAME:linux-amd64-build" \
            "$REGISTRY/$IMAGE_NAME:linux-arm64-build"

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.VERSION }}
          format: table
          exit-code: 0

      - name: Generate Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        id: release_notes
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREVIOUS_TAG=$(git tag --sort=-version:refname | sed -n 2p)

          echo "## 🚀 What's Changed" > release_notes.md
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "### 📋 Commits since $PREVIOUS_TAG:" >> release_notes.md
            git log "$PREVIOUS_TAG..$CURRENT_TAG" \
              --reverse --date-order \
              --pretty=format:"- %s (%an) - %h" \
              --invert-grep --grep="Merge" >> release_notes.md
          else
            echo "### 📋 Initial Release Commits:" >> release_notes.md
            git log --reverse --date-order \
              --pretty=format:"- %s (%an) - %h" \
              --invert-grep --grep="Merge" >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "## 🐳 Docker Image" >> release_notes.md
          echo "Pull the image with:" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "docker pull \"ghcr.io/${{ steps.image.outputs.name }}:${{ steps.version.outputs.VERSION }}\"" >> release_notes.md
          echo '```' >> release_notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.6.1
        with:
          body_path: release_notes.md
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}