<!DOCTYPE html>
<html lang="en" data-bs-theme="light" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/static/js/theme.js?v={{ version }}"></script>
    <title data-i18n="auth.login_page_title">Login - MyAstroBoard</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/bs_variables.css?v={{ version }}">
    <link rel="stylesheet" href="/static/css/bs_main.css?v={{ version }}">
    <link rel="stylesheet" href="/static/css/bs_login.css?v={{ version }}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <h1>🌙 MyAstroBoard</h1>
            <p data-i18n="auth.please_authenticate">Please log in to continue</p>
        </div>
        
        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>
        
        <form id="login-form" class="login-form" method="POST" action="/api/auth/login">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="Username" data-i18n-placeholder="users.username" required autofocus autocomplete="username">
                <label for="username" data-i18n="users.username" id="username-label">👤 Username</label>
            </div>
            
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" data-i18n-placeholder="users.password" required autocomplete="current-password">
                <label for="password" data-i18n="users.password" id="password-label">🔐 Password</label>
            </div>
            
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="remember-me" name="remember-me">
                <label class="form-check-label" for="remember-me" data-i18n="auth.remember_me_30_days">Remember me (stay logged in for 30 days)</label>
            </div>
            
            <button type="submit" class="btn btn-login" id="login-btn">
                <span class="btn-text" data-i18n="auth.sign_in">🚀 Sign In</span>
            </button>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="/static/js/i18n.js?v={{ version }}"></script>
    <script src="/static/js/login.js?v={{ version }}"></script>
</body>
</html>
